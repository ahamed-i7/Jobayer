<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            color: #667eea;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .joke-display {
            background: #f8f9ff;
            border-left: 5px solid #667eea;
            padding: 25px;
            border-radius: 10px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .joke-text {
            font-size: 1.3em;
            color: #333;
            font-weight: 500;
            text-align: center;
            line-height: 1.6;
        }

        .joke-category {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            margin-top: 10px;
        }

        .button-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #e0e7ff;
            color: #667eea;
        }

        .btn-secondary:hover {
            background: #cdd5ff;
            transform: translateY(-2px);
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-weight: 600;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 5px solid #c33;
        }

        .category-filter {
            margin-bottom: 30px;
            text-align: center;
        }

        .category-filter label {
            color: #666;
            font-weight: 600;
            margin-right: 10px;
        }

        .category-filter select {
            padding: 8px 15px;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            background: white;
        }

        .stats {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #eee;
            color: #999;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            .header h1 {
                font-size: 2em;
            }

            .joke-text {
                font-size: 1.1em;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>😂 Joke Generator</h1>
            <p>Get a random laugh every time!</p>
        </div>

        <div class="category-filter">
            <label for="category">Category:</label>
            <select id="category">
                <option value="any">Any</option>
                <option value="programming">Programming</option>
                <option value="knock-knock">Knock-Knock</option>
                <option value="general">General</option>
            </select>
        </div>

        <div id="error-message" class="error" style="display: none;"></div>

        <div class="joke-display">
            <div id="joke-content" class="joke-text">
                Click "Get Joke" to start laughing! 🎉
            </div>
        </div>

        <div class="button-group">
            <button class="btn-primary" id="get-joke-btn" onclick="getJoke()">Get Joke</button>
            <button class="btn-secondary" id="copy-btn" onclick="copyJoke()" style="display: none;">Copy Joke</button>
            <button class="btn-secondary" onclick="shareJoke()">Share</button>
        </div>

        <div class="stats">
            <p>Jokes fetched: <strong id="joke-count">0</strong></p>
        </div>
    </div>

    <script>
        let currentJoke = '';
        let jokeCount = 0;
        const API_URL = 'https://official-joke-api.appspot.com/random_joke';
        const PROGRAMMING_API = 'https://official-joke-api.appspot.com/jokes/programming/random';
        const KNOCKKNOCK_API = 'https://official-joke-api.appspot.com/jokes/knock-knock/random';

        // Load joke count from localStorage
        function loadJokeCount() {
            const saved = localStorage.getItem('jokeCount');
            jokeCount = saved ? parseInt(saved) : 0;
            document.getElementById('joke-count').textContent = jokeCount;
        }

        // Save joke count to localStorage
        function saveJokeCount() {
            localStorage.setItem('jokeCount', jokeCount);
            document.getElementById('joke-count').textContent = jokeCount;
        }

        async function getJoke() {
            const btn = document.getElementById('get-joke-btn');
            const jokeContent = document.getElementById('joke-content');
            const errorDiv = document.getElementById('error-message');
            const category = document.getElementById('category').value;

            // Disable button and show loading state
            btn.disabled = true;
            errorDiv.style.display = 'none';
            jokeContent.innerHTML = '<div class="spinner"></div> <span class="loading">Loading joke...</span>';

            try {
                let url = API_URL;

                // Select API based on category
                if (category === 'programming') {
                    url = PROGRAMMING_API;
                } else if (category === 'knock-knock') {
                    url = KNOCKKNOCK_API;
                }

                const response = await fetch(url);

                if (!response.ok) {
                    throw new Error('Failed to fetch joke');
                }

                const data = await response.json();

                // Handle both single joke and array response
                const joke = Array.isArray(data) ? data[0] : data;

                // Format the joke
                if (joke.type === 'knock-knock') {
                    currentJoke = `${joke.setup}\n${joke.delivery}`;
                } else if (joke.setup && joke.punchline) {
                    currentJoke = `${joke.setup}\n\n${joke.punchline}`;
                } else {
                    currentJoke = joke.joke || 'No joke found';
                }

                // Display joke with category
                jokeContent.innerHTML = `
                    <div>
                        <div class="joke-text">${escapeHtml(currentJoke)}</div>
                        ${joke.type ? `<div class="joke-category">${joke.type}</div>` : ''}
                    </div>
                `;

                // Update stats
                jokeCount++;
                saveJokeCount();

                // Show copy button
                document.getElementById('copy-btn').style.display = 'inline-block';

            } catch (error) {
                console.error('Error fetching joke:', error);
                jokeContent.innerHTML = '😅 Oops! Something went wrong. Please try again!';
                errorDiv.textContent = 'Error: ' + error.message;
                errorDiv.style.display = 'block';
                currentJoke = '';
                document.getElementById('copy-btn').style.display = 'none';
            } finally {
                btn.disabled = false;
            }
        }

        function copyJoke() {
            if (currentJoke) {
                navigator.clipboard.writeText(currentJoke).then(() => {
                    const btn = document.getElementById('copy-btn');
                    const originalText = btn.textContent;
                    btn.textContent = '✓ Copied!';
                    setTimeout(() => {
                        btn.textContent = originalText;
                    }, 2000);
                }).catch(() => {
                    alert('Failed to copy joke');
                });
            }
        }

        function shareJoke() {
            if (!currentJoke) {
                alert('Get a joke first!');
                return;
            }

            const text = `Check out this joke: ${currentJoke}\n\n😂 Generated by Joke Generator`;

            if (navigator.share) {
                navigator.share({
                    title: 'Funny Joke',
                    text: text
                }).catch(err => console.log('Error sharing:', err));
            } else {
                // Fallback for browsers that don't support Web Share API
                alert(text);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML.replace(/\n/g, '<br>');
        }

        // Load joke count on page load
        window.addEventListener('load', loadJokeCount);

        // Fetch a joke on page load
        window.addEventListener('load', getJoke);
    </script>
</body>
</html>
